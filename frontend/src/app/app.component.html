<h1>Gestor de Tareas</h1>

<div class="form-container">
  <h3>Nueva tarea</h3>
  <input type="text" [(ngModel)]="newTitle" placeholder="Título" />
  <input type="text" [(ngModel)]="newDescription" placeholder="Descripción (opcional)" />
  <select [(ngModel)]="newPriority">
    <option value="" disabled selected>Selecciona una prioridad</option>
    <option value="low">Baja</option>
    <option value="medium">Media</option>
    <option value="high">Alta</option>
  </select>
  <button (click)="addTask()">+ Crear tarea</button>
</div>

<div class="tasks-container">
  <h3>Mis tareas ({{ tasks.length }})</h3>

  <ul>
    <li class="task-card" *ngFor="let task of tasks">
      <div class="task-info">
        <strong>{{ task.title }}</strong>
        <span class="task-status" [ngClass]="'status-' + task.status">
          {{ task.status }}
        </span>
        <span class="task-priority" [ngClass]="'priority-' + task.priority">
          {{ task.priority }}
        </span>
        <span class="task-description" *ngIf="task.description">{{ task.description }}</span>
      </div>

      <div class="task-actions">
        <button class="btn-advance" *ngIf="task.status !== 'completed'" (click)="advanceStatus(task)">
          Avanzar
        </button>
        <button class="btn-delete" (click)="deleteTask(task)">Eliminar</button>
      </div>
    </li>
  </ul>
</div>
